<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <!-- Make website responsive -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="dark light">
        <meta description="A website built to allow users to send a pre-defined email (which they can preview) to multiple, pre-defined recipients (which they can preview in their email app).">
        <title>Email Sender</title>
        <link href="./styles.css" rel="stylesheet"/>
        <script>
            let emailMessageBody = `This is where the full body of the email goes, for more of a visual representation of how it would look, here's some more text:
            
            Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.

            `;

            let subjectLine = `Subject Line`;

            function normaliseString(str) {
                // Define a mapping of accented letters to their non-accented equivalents
                const charMap = {
                    '√†': 'a',
                    '√°': 'a',
                    '√§': 'a',
                    '√©': 'e',
                    '√®': 'e',
                    '√™': 'e',
                    '√ę': 'e',
                    '√≠': 'i',
                    '√ģ': 'i',
                    '√Į': 'i',
                    '√¨': 'i',
                    '√≥': 'o',
                    '√ī': 'o',
                    '√∂': 'o',
                    '√ļ': 'u',
                    '√Ľ': 'u',
                    '√ľ': 'u',
                    'Ňę': 'u',
                    '√ß': 'c',
                    '√Ä': 'A',
                    '√Ā': 'A',
                    '√Ą': 'A',
                    '√Č': 'E',
                    '√ą': 'E',
                    '√ä': 'E',
                    '√č': 'E',
                    '√ć': 'I',
                    '√Ć': 'I',
                    '√é': 'I',
                    '√Ź': 'I',
                    '√ď': 'O',
                    '√Ē': 'O',
                    '√Ė': 'O',
                    '√ö': 'U',
                    '√õ': 'U',
                    '√ú': 'U',
                    'Ň™': 'U',
                    '√á': 'C',
                    // Add more mappings as needed
                    // **********TODO also move to Javascript file**********
                };

                // Use a regular expression to replace special characters
                return str.replace(/[√†√°√§√©√®√™√ę√≠√ģ√¨√Į√≥√ī√∂√ļ√Ľ√ľŇę√ß√Ä√Ā√Ą√Č√ą√ä√č√ć√Ć√é√Ź√ď√Ē√Ė√ö√õ√úŇ™√á]/g, match => charMap[match] || match);
            }

            function sendEmail() {
                // Get user's signature from text area
                let signature = document.getElementById("signature").value;

                // Replace multiple spaces with a single space character, then trim
                signature = signature.replace(/\s+/g, " ").trim();

                // Normalise signature by replacing special characters
                let normalisedSignature = normaliseString(signature);

                // Trim trailing whitespace from emailMessageBody
                let trimmedEmailMessageBody = emailMessageBody.trim();

                // Create encoded mail-to link
                let mailToLink = `mailto:exampleEmail1@email.com,exampleEmail2@email.com?subject=${subjectLine}&body=${encodeURIComponent(trimmedEmailMessageBody + "\n" + normalisedSignature)}`;

                // Open email client with pre-filled email
                window.location.href = mailToLink;
            }
        </script>
    </head>
    <body>
        <div>
            <p>Please sign your name and we will write and sign the below email on your behalf.</p>
            <textarea class="signature-box" id="signature" name="signature" placeholder="Type your full name here"></textarea>
            <input class="send-email-button" type="button" value="Send Email" onclick="sendEmail()">
            <h3><script>document.write(subjectLine)</script></h3>
            <p><script>document.write(emailMessageBody)</script></p>
        </div>
        <footer>
            <h5>Made by Sarah Caulfield</h5>
            <a class="footer-links" href="https://www.linkedin.com/in/scaulfield7/">LinkedIn</a>&nbsp;&nbsp;|&nbsp;&nbsp;
            <a class="footer-links" href="https://github.com/scaulfield7">GitHub</a>&nbsp;&nbsp;|&nbsp;&nbsp;
            <a class="footer-links" href="https://ko-fi.com/scaulfield7">Ko-fi</a>
        </footer>
    </body>
</html>
